name: Canopy
options:
  bundleIdPrefix: com.canopy
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: true

targets:
  Canopy:
    type: application
    platform: macOS
    sources:
      - path: Canopy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.canopy.app
        PRODUCT_NAME: Canopy
        INFOPLIST_FILE: Canopy/Info.plist
        CODE_SIGN_ENTITLEMENTS: Canopy/Canopy.entitlements
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true

  CanopyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CanopyTests
    dependencies:
      - target: Canopy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.canopy.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Canopy:
    build:
      targets:
        Canopy: all
        CanopyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CanopyTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
